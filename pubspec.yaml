name: tik_chat_app
description: "تطبيق تيك شات - محادثات آمنة وتصميم راقي"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase - قاعدة البيانات والمصادقة والـ Realtime
  supabase_flutter: ^2.5.0

  # حفظ بيانات الجلسة محلياً
  shared_preferences: ^2.2.3

  # خطوط عربية
  google_fonts: ^6.2.1

  # صور الشبكة مع كاش
  cached_network_image: ^3.3.1

  # اختيار الصور
  image_picker: ^1.1.2

  # مؤشرات التحميل
  shimmer: ^3.0.0

  # وقت نسبي (منذ 5 دقائق)
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
