name: Build Dardashati APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      # هذه الخطوة ستحل لغز المسارات؛ ستخبرنا أين يقع ملف pubspec.yaml بالضبط
      - name: Locate Project Root
        run: |
          echo "Searching for pubspec.yaml..."
          find . -name "pubspec.yaml"

      - name: Install Dependencies
        run: |
          # سنبحث عن المجلد الذي يحتوي على pubspec.yaml وندخل إليه برمجياً
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          cd "$PROJECT_ROOT"
          flutter pub get

      - name: Build APK
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          cd "$PROJECT_ROOT"
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dardashati-release-apk
          # نستخدم النمط العالمي للبحث عن الـ APK المخرجة مهما كان عمق المجلد
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
