name: Build Dardashati APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Install Dependencies
        # استخدمنا العمليات المتتالية للتأكد من الدخول للمجلد الصحيح
        run: |
          cd JDAD/dardashati
          flutter pub get

      - name: Build APK
        run: |
          cd JDAD/dardashati
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dardashati-release-apk
          # تأكد أن هذا المسار يطابق تماماً مخرجات بناء فلاتر
          path: JDAD/dardashati/build/app/outputs/flutter-apk/app-release.apk
