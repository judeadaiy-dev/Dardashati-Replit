buildscript {
    ext.kotlin_version = '1.9.0' // نسخة مستقرة مع النظام الجديد
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // هذه النسخة ضرورية لتعمل مع ملف settings.gradle الذي تملكه
        classpath 'com.android.tools.build:gradle:8.1.0' 
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
