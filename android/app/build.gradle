plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.tikchat.app"
    compileSdk 34
    // تم تعديل طريقة كتابة ndkVersion لتكون أكثر أماناً في الإصدارات الحديثة
    ndkVersion "25.1.8937393" 

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.tikchat.app"
        // تم تغيير التسمية إلى minSdk و targetSdk (بدون Version) لأنها الطريقة الأحدث
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            // توقيع التطبيق للـ Release
            signingConfig signingConfigs.debug 
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // يفضل دائماً ترك قسم dependencies فارغاً إذا كنت تعتمد على Plugins فقط
    // أو إضافة أي مكتبات native تحتاجها هنا
}
