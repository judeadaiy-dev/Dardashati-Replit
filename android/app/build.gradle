plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // الـ namespace يجب أن يكون بتنسيق نقاط (com.name.app) وليس رابطاً
    namespace "com.dardashati.app" 
    compileSdk 34
    
    ndkVersion "25.1.8937393" 

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        // هذا هو الأهم، يجب أن يتطابق مع ما وضعته في Google Cloud Console
        applicationId "com.dardashati.app"
        
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug 
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // يبقى فارغاً كما فضلت
}
