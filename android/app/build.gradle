plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.dardashati.app" 
    compileSdk 34
    
    ndkVersion "25.1.8937393" 

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.dardashati.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"

        // السطر السحري لاستخراج الكود بدون تيرمنال
        // سيظهر في سجلات GitHub Actions تحت اسم MY_SHA1_KEY
        resValue "string", "build_time", "SHA1: " + signingConfigs.debug
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug 
            minifyEnabled false
            shrinkResources false
        }
    }
}

// السطر الذي وضعته أنت سنضعه هنا ليكون واضحاً في السجلات
println("MY_SHA1_KEY: " + android.signingConfigs.debug)

flutter {
    source '../..'
}

dependencies {
    // يبقى فارغاً
}
