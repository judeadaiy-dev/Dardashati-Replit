plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // الهوية الرسمية للتطبيق - يجب أن تطابق المسجل في Firebase/Supabase
    namespace "com.dardashati.app" 
    compileSdk 34
    
    ndkVersion "25.1.8937393" 

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.dardashati.app"
        minSdk 21 
        targetSdk 34
        versionCode 1
        versionName "1.0.0"

        // دعم تعدد اللغات (العربية أساسية)
        resConfigs "ar", "en"
    }

    buildTypes {
        release {
            // استخدام مفتاح الـ debug مؤقتاً لتسهيل البناء الأولي
            signingConfig signingConfigs.debug 
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // يتم إدارة التبعيات عبر Flutter pubspec.yaml
}

// تفعيل Plugin خدمات جوجل لقراءة ملف google-services.json
// ملاحظة: يجب وضع هذا السطر في نهاية الملف تماماً
apply plugin: 'com.google.gms.google-services'
