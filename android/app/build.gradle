plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // الهوية الرسمية للتطبيق (تأكد أنها مطابقة لـ SHA-1 في Google Console)
    namespace "com.dardashati.app" 
    compileSdk 34
    
    ndkVersion "25.1.8937393" 

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.dardashati.app"
        // رفعنا الـ minSdk لـ 21 لضمان توافق مكتبة تسجيل دخول جوجل
        minSdk 21 
        targetSdk 34
        versionCode 1
        versionName "1.0.0"

        // لضمان دعم تعدد اللغات (العربية أساسية)
        resConfigs "ar", "en"
    }

    buildTypes {
        release {
            // مؤقتاً نستخدم توقيع الـ debug لتجنب أخطاء البناء في GitHub Actions
            signingConfig signingConfigs.debug 
            
            // قمت بتعطيل الـ Minify حالياً لضمان عدم حذف أكواد Supabase بالخطأ
            minifyEnabled false
            shrinkResources false
            
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // إعدادات لتجنب تعارض الملفات أثناء البناء
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // التبعيات يتم إدارتها بواسطة Flutter pubspec.yaml
    // لكن نحتاج أحياناً لدعم MultiDex إذا كبر حجم التطبيق
    implementation "androidx.multidex:multidex:2.0.1"
}
