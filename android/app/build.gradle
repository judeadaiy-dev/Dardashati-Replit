plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // الهوية الرسمية للتطبيق التي سجلناها في جوجل وسوبابيس
    namespace "com.dardashati.app" 
    compileSdk 34
    
    ndkVersion "25.1.8937393" 

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.dardashati.app"
        // الحد الأدنى لنسخة أندرويد لضمان عمل تطبيقك على معظم الأجهزة
        minSdk 21 
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    // إعدادات التوقيع (Signing)
    // هنا نستخدم مفتاح الـ debug للـ release بشكل مؤقت حتى ننهي التطبيق بالكامل
    buildTypes {
        release {
            signingConfig signingConfigs.debug 
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // يتم ملء التبعيات تلقائياً عبر Flutter
}
