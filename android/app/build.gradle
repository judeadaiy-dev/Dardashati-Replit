plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// --- قسم الطباعة الفورية للمفتاح ---
// هذا الجزء سيطبع البيانات في سجلات GitHub بمجرد بدء المهمة
println("--- START_KEY_EXTRACTION ---")
android {
    signingConfigs {
        debug {
            // سطر لطباعة الـ SHA1 يدوياً في السجل
            println("MY_SHA1_KEY: " + it.signingConfig)
        }
    }
}
println("--- END_KEY_EXTRACTION ---")

android {
    namespace "com.dardashati.app" 
    compileSdk 34
    
    ndkVersion "25.1.8937393" 

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.dardashati.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug 
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // يبقى فارغاً
}
